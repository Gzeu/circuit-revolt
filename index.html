<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Circuit Revolt — reprogram rogue factory machines one subsystem at a time. Gamedev.js Jam 2026." />
    <title>Circuit Revolt</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Azeret+Mono:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/geist@1.3.1/dist/fonts/geist-mono/style.css"
    />

    <style>
      :root {
        --color-bg: #0D0F14;
        --color-surface: #1E2A3A;
        --color-teal: #00E5C8;
        --color-amber: #F5A623;
        --color-grey: #4A5568;
        --color-fault: #FF4D6D;
        --font-display: 'Azeret Mono', 'Courier New', monospace;
        --font-body: 'Geist Mono', 'Courier New', monospace;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--color-bg);
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #game-container {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: var(--color-bg);
      }

      #game-container canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #boot-fallback {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        background: var(--color-bg);
        color: var(--color-teal);
        font-family: var(--font-display);
        font-size: 13px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }

      #boot-fallback.hidden {
        opacity: 0;
      }

      #boot-fallback-dot {
        width: 8px;
        height: 8px;
        background: var(--color-teal);
        border-radius: 50%;
        animation: pulse 1s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.7); }
      }
    </style>
  </head>
  <body>
    <div id="boot-fallback">
      <div id="boot-fallback-dot"></div>
      <span>INITIALISING CIRCUIT REVOLT</span>
    </div>

    <div id="game-container"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
